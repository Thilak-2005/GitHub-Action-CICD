name: Enterprise Multi-Job CI/CD Pipeline

on:
  push:
    branches:
      - main

# This single line forces GitHub to use the newest Node.js version, silencing the warnings!
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: TEST STAGE
  # ==========================================
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./secure-cicd-pipeline
    steps:
      # UPDATED to v4
      - name: Checkout Code
        uses: actions/checkout@v4

      # UPDATED to v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies and test
        run: |
          pip install -r requirements.txt
          pytest

  # ==========================================
  # JOB 2: BUILD AND SECURITY SCAN STAGE
  # ==========================================
  build-and-scan:
    runs-on: ubuntu-latest
    needs: test 
    defaults:
      run:
        working-directory: ./secure-cicd-pipeline
    steps:
      # UPDATED to v4
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image Local Cache
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Save Docker Image as Artifact
        run: docker save ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest -o my-app.tar

      - name: Upload Image Artifact to Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: secure-cicd-pipeline/my-app.tar
          retention-days: 1

  # ==========================================
  # JOB 3: PUSH TO DOCKER HUB STAGE
  # ==========================================
  push-to-registry:
    runs-on: ubuntu-latest
    needs: build-and-scan 
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i my-app.tar

      # UPDATED to v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest

  
              
      
